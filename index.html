const Pill = ({ children, tone = 'neutral' }) => {
  const tones = {
    neutral: 'bg-stone-800/60 text-stone-300 border-stone-700',
    accent: 'bg-amber-900/30 text-amber-200 border-amber-800/60',
    success: 'bg-emerald-900/30 text-emerald-200 border-emerald-800/60',
    warn: 'bg-rose-900/30 text-rose-200 border-rose-800/60',
  };
  return (
    <span className={`inline-flex items-center gap-1 text-[10px] uppercase tracking-[0.15em] px-2 py-1 border ${tones[tone]} font-mono`}>
      {children}
    </span>
  );
};

    <div className="text-sm text-stone-400 leading-relaxed mb-3 font-light">{j.program}</div>
    <div className="flex flex-wrap gap-1.5">
      <Pill tone="accent">{j.type}</Pill>
      {j.culturalTest && <Pill>Cultural test</Pill>}
      {!j.culturalTest && <Pill tone="success">No cultural test</Pill>}
    </div>
  </button>
);

const DetailPanel = ({ j, onClose, checked, toggleCheck }) => {
  if (!j) return null;
  const specificDocs = JURISDICTION_DOCS[j.id] || [];
  const allDocs = [...COMMON_DOCS, ...specificDocs];
  const completed = allDocs.filter((d) => checked[`${j.id}:${d.id}`]).length;
  const total = allDocs.length;

  const categories = {
    creative: { label: 'Creative & Script', docs: [] },
    financial: { label: 'Financial', docs: [] },
    legal: { label: 'Legal & Corporate', docs: [] },
    production: { label: 'Production', docs: [] },
    specific: { label: `${j.name}-Specific`, docs: [] },
  };
  allDocs.forEach((d) => categories[d.category]?.docs.push(d));

  return (
    <div className="fixed inset-0 z-50 flex items-stretch justify-end bg-black/70 backdrop-blur-sm" onClick={onClose}>
      <div
        className="w-full max-w-2xl bg-stone-950 border-l border-stone-800 overflow-y-auto"
        onClick={(e) => e.stopPropagation()}
      >
        <div className="sticky top-0 bg-stone-950/95 backdrop-blur border-b border-stone-800 px-8 py-5 flex items-start justify-between z-10">
          <div className="flex items-center gap-4">
            <span className="text-4xl">{j.flag}</span>
            <div>
              <h2 className="font-serif text-3xl text-stone-100 leading-none">{j.name}</h2>
              <div className="text-xs text-stone-500 mt-1.5 font-mono uppercase tracking-[0.2em]">
                {j.region} · {j.authority}
              </div>
            </div>
          </div>
          <button onClick={onClose} className="text-stone-500 hover:text-stone-200 transition">
            <XIcon size={20} />
          </button>
        </div>

        <div className="px-8 py-6 space-y-8">
          <div>
            <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-2 font-sans">Program</div>
            <div className="font-serif text-2xl text-stone-100 mb-1">{j.program}</div>
            <Pill tone="accent">{j.type}</Pill>
          </div>

          <div className="border border-stone-800 bg-gradient-to-br from-stone-900/80 to-stone-950 p-6">
            <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-3 font-sans">Headline Rate</div>
            <div className="font-mono text-5xl text-amber-200 font-light mb-2">{j.headlineRate}%</div>
            <div className="text-sm text-stone-400 font-light">{j.rateLabel}</div>
          </div>

          <div className="grid grid-cols-2 gap-5">
            <Stat label="Minimum Spend" value={j.minSpend} />
            <Stat label="Annual Cap" value={j.annualCap} />
            <Stat label="Payout Timing" value={j.payoutTiming} />
            <Stat label="Cultural Test" value={j.culturalTest ? 'Required' : 'Not required'} />
          </div>

          <div>
            <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-2 font-sans">Qualifying Spend</div>
            <p className="text-stone-300 leading-relaxed font-light">{j.qualifyingSpend}</p>
          </div>

          <div className="border-t border-stone-800 pt-6">
            <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-3 font-sans flex items-center gap-2">
              <AlertIcon size={12} /> Notes
            </div>
            <p className="text-stone-300 leading-relaxed font-light italic">{j.notes}</p>
          </div>

          <div className="grid grid-cols-2 gap-6 border-t border-stone-800 pt-6">
            <div>
              <div className="text-[10px] uppercase tracking-[0.25em] text-emerald-500 mb-3 font-sans">Strengths</div>
              <ul className="space-y-2">
                {j.pros.map((p, i) => (
                  <li key={i} className="text-sm text-stone-300 flex gap-2 font-light">
                    <span className="text-emerald-700 mt-1.5">▸</span>
                    {p}
                  </li>
                ))}
              </ul>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-[0.25em] text-rose-500 mb-3 font-sans">Watch-outs</div>
              <ul className="space-y-2">
                {j.cons.map((c, i) => (
                  <li key={i} className="text-sm text-stone-300 flex gap-2 font-light">
                    <span className="text-rose-700 mt-1.5">▸</span>
                    {c}
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <div className="border-t border-stone-800 pt-6">
            <div className="flex items-center justify-between mb-5">
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-1 font-sans">
                  Client Documentation Checklist
                </div>
                <div className="font-serif text-2xl text-stone-100">Required from production</div>
              </div>
              <div className="text-right">
                <div className="font-mono text-2xl text-amber-200">
                  {completed}<span className="text-stone-600">/{total}</span>
                </div>
                <div className="text-[10px] text-stone-500 uppercase tracking-wider">collected</div>
              </div>
            </div>

            <div className="space-y-5">
              {Object.entries(categories).map(([key, cat]) =>
                cat.docs.length === 0 ? null : (
                  <div key={key}>
                    <div className="text-[10px] uppercase tracking-[0.2em] text-amber-200/70 mb-2 font-mono">
                      {cat.label}
                    </div>
                    <div className="space-y-1.5">
                      {cat.docs.map((d) => {
                        const isChecked = !!checked[`${j.id}:${d.id}`];
                        return (
                          <button
                            key={d.id}
                            onClick={() => toggleCheck(`${j.id}:${d.id}`)}
                            className="w-full flex items-start gap-3 text-left py-2 px-3 hover:bg-stone-900/60 transition group"
                          >
                            {isChecked ? (
                              <CheckCircleIcon size={16} className="text-emerald-500 mt-0.5 shrink-0" />
                            ) : (
                              <CircleIcon size={16} className="text-stone-600 mt-0.5 shrink-0 group-hover:text-stone-400" />
                            )}
                            <span className={`text-sm font-light ${isChecked ? 'text-stone-500 line-through' : 'text-stone-200'}`}>
                              {d.label}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const PreScreener = ({ onClose }) => {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});

  const questions = [
    { id:'budget', label:'Total production budget (USD)', options:['< $500K','$500K – $5M','$5M – $25M','$25M – $100M','> $100M'] },
    { id:'type', label:'Project type', options:['Feature Film','TV / Streaming Series','Documentary','Animation / VFX-heavy','Short Film'] },
    { id:'region', label:'Preferred shooting region', options:['Europe','Americas','Asia-Pacific','Africa','No preference'] },
    { id:'cultural', label:'Cultural test acceptable?', options:['Yes — willing to localize creative elements','No — purely a location shoot','Open to either'] },
    { id:'payout', label:'Payout timing priority', options:['Need fast turnaround (cash rebate)','Can wait for tax credit (12–18 mo)','Either is fine'] },
  ];

  const q = questions[step];

  const getRecommendations = () => {
    let candidates = [...JURISDICTIONS];
    if (answers.region && answers.region !== 'No preference') {
      candidates = candidates.filter((c) => c.region === answers.region);
    }
    if (answers.cultural === 'No — purely a location shoot') {
      candidates = candidates.filter((c) => !c.culturalTest);
    }
    if (answers.payout === 'Need fast turnaround (cash rebate)') {
      candidates = candidates.filter((c) => /rebate|grant|reimbursement/i.test(c.type));
    }
    if (answers.budget === '< $500K') {
      candidates = candidates.filter((c) => !/€1M|US\$500,000|ZAR 12M|THB 50M|AU\$20M|NZ\$15M|\$25M/i.test(c.minSpend));
    }
    return candidates.sort((a, b) => b.headlineRate - a.headlineRate).slice(0, 5);
  };

  const submit = (option) => {
    const next = { ...answers, [q.id]: option };
    setAnswers(next);
    if (step < questions.length - 1) setStep(step + 1);
    else setStep(questions.length);
  };

  const done = step >= questions.length;
  const recs = done ? getRecommendations() : [];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" onClick={onClose}>
      <div className="w-full max-w-2xl bg-stone-950 border border-stone-800 max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="border-b border-stone-800 px-8 py-5 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <SparklesIcon size={18} className="text-amber-200" />
            <div className="font-serif text-2xl text-stone-100">Eligibility Pre-Screener</div>
          </div>
          <button onClick={onClose} className="text-stone-500 hover:text-stone-200">
            <XIcon size={20} />
          </button>
        </div>

        <div className="px-8 py-8">
          {!done ? (
            <>
              <div className="flex items-center gap-2 mb-6">
                {questions.map((_, i) => (
                  <div key={i} className={`h-0.5 flex-1 transition ${i <= step ? 'bg-amber-200' : 'bg-stone-800'}`} />
                ))}
              </div>
              <div className="text-xs text-stone-500 mb-3 font-mono uppercase tracking-wider">
                Question {step + 1} of {questions.length}
              </div>
              <div className="font-serif text-2xl text-stone-100 mb-6">{q.label}</div>
              <div className="space-y-2">
                {q.options.map((opt) => (
                  <button
                    key={opt}
                    onClick={() => submit(opt)}
                    className="w-full text-left border border-stone-800 hover:border-amber-700 hover:bg-stone-900/60 px-5 py-4 text-stone-200 font-light transition flex items-center justify-between group"
                  >
                    {opt}
                    <ArrowRightIcon size={16} className="text-stone-600 group-hover:text-amber-200 transition" />
                  </button>
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="text-xs text-stone-500 mb-3 font-mono uppercase tracking-wider">Top Matches</div>
              <div className="font-serif text-2xl text-stone-100 mb-2">Based on your inputs</div>
              <p className="text-sm text-stone-400 font-light mb-6">
                Ranked by headline rate after filtering for region, cultural test preference, payout speed, and budget fit.
                This is indicative only — full eligibility requires reviewing each program's detailed criteria.
              </p>
              {recs.length === 0 ? (
                <div className="border border-stone-800 p-6 text-stone-400 text-sm">
                  No jurisdictions match all of your constraints. Try loosening the cultural test or region filter.
                </div>
              ) : (
                <div className="space-y-2">
                  {recs.map((r, i) => (
                    <div key={r.id} className="border border-stone-800 px-5 py-4 flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className="font-mono text-xs text-stone-500 w-5">{String(i + 1).padStart(2, '0')}</div>
                        <span className="text-2xl">{r.flag}</span>
                        <div>
                          <div className="font-serif text-lg text-stone-100 leading-tight">{r.name}</div>
                          <div className="text-xs text-stone-500 font-mono uppercase tracking-wider mt-0.5">{r.program}</div>
                        </div>
                      </div>
                      <div className="font-mono text-2xl text-amber-200 font-light">{r.headlineRate}%</div>
                    </div>
                  ))}
                </div>
              )}
              <button
                onClick={() => { setStep(0); setAnswers({}); }}
                className="mt-6 text-xs font-mono uppercase tracking-[0.2em] text-amber-200 hover:text-amber-100"
              >
                ← Start over
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

function FilmIncentivesApp() {
  const [query, setQuery] = useState('');
  const [region, setRegion] = useState('All');
  const [type, setType] = useState('All');
  const [selected, setSelected] = useState(null);
  const [checked, setChecked] = useState({});
  const [showScreener, setShowScreener] = useState(false);

  const regions = useMemo(() => ['All', ...Array.from(new Set(JURISDICTIONS.map((j) => j.region)))], []);
  const types = useMemo(() => ['All', ...Array.from(new Set(JURISDICTIONS.map((j) => j.type)))], []);

  const filtered = useMemo(() => {
    return JURISDICTIONS.filter((j) => {
      const q = query.toLowerCase();
      const matchQ = !q || j.name.toLowerCase().includes(q) || j.program.toLowerCase().includes(q) || j.region.toLowerCase().includes(q);
      const matchR = region === 'All' || j.region === region;
      const matchT = type === 'All' || j.type === type;
      return matchQ && matchR && matchT;
    });
  }, [query, region, type]);

  const toggleCheck = (key) => setChecked((prev) => ({ ...prev, [key]: !prev[key] }));

  return (
    <div className="min-h-screen bg-stone-950 text-stone-100">
      <header className="border-b border-stone-800 bg-stone-950/80 backdrop-blur sticky top-0 z-20">
        <div className="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">
          <div className="flex items-baseline gap-4">
            <div className="font-serif text-3xl text-stone-100 leading-none tracking-tight">
              Reel<span className="text-amber-200">Ledger</span>
            </div>
            <div className="text-[10px] text-stone-500 uppercase tracking-[0.3em] font-mono hidden sm:block">
              Film Incentive Intelligence
            </div>
          </div>
          <button
            onClick={() => setShowScreener(true)}
            className="flex items-center gap-2 border border-amber-700/60 hover:border-amber-500 bg-amber-900/20 hover:bg-amber-900/40 px-4 py-2 text-amber-100 text-sm font-mono uppercase tracking-wider transition"
          >
            <SparklesIcon size={14} /> Pre-Screen
          </button>
        </div>
      </header>

      <section className="max-w-7xl mx-auto px-8 pt-12 pb-8 border-b border-stone-800">
        <div className="grid md:grid-cols-3 gap-8 items-end">
          <div className="md:col-span-2">
            <div className="text-[10px] text-stone-500 uppercase tracking-[0.3em] font-mono mb-3">
              {JURISDICTIONS.length} jurisdictions · updated {new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' })}
            </div>
            <h1 className="font-serif text-5xl md:text-6xl text-stone-100 leading-[1.05] mb-4">
              Where the world<br />pays you to shoot.
            </h1>
            <p className="text-stone-400 max-w-xl font-light leading-relaxed">
              A working reference of national and regional film production incentives — rates, eligibility,
              payout timing, and the documentation you'll need to collect from each client.
            </p>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-l-2 border-amber-200/60 pl-4">
              <div className="font-mono text-3xl text-amber-200 font-light">50%</div>
              <div className="text-[10px] text-stone-500 uppercase tracking-wider mt-1">Highest rate (Canary Is.)</div>
            </div>
            <div className="border-l-2 border-stone-700 pl-4">
              <div className="font-mono text-3xl text-stone-100 font-light">{JURISDICTIONS.length}</div>
              <div className="text-[10px] text-stone-500 uppercase tracking-wider mt-1">Programs tracked</div>
            </div>
          </div>
        </div>
      </section>

      <section className="max-w-7xl mx-auto px-8 py-6 border-b border-stone-800 sticky top-[81px] bg-stone-950/95 backdrop-blur z-10">
        <div className="flex flex-col md:flex-row gap-3 items-stretch md:items-center">
          <div className="relative flex-1">
            <SearchIcon size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-500" />
            <input
              type="text"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Search country, program, or region…"
              className="w-full bg-stone-900/60 border border-stone-800 focus:border-amber-700 outline-none pl-11 pr-4 py-3 text-stone-100 placeholder:text-stone-600 font-light transition"
            />
          </div>
          <div className="flex gap-3">
            <select
              value={region}
              onChange={(e) => setRegion(e.target.value)}
              className="bg-stone-900/60 border border-stone-800 focus:border-amber-700 outline-none px-4 py-3 text-stone-200 text-sm font-light"
            >
              {regions.map((r) => <option key={r} value={r}>Region: {r}</option>)}
            </select>
            <select
              value={type}
              onChange={(e) => setType(e.target.value)}
              className="bg-stone-900/60 border border-stone-800 focus:border-amber-700 outline-none px-4 py-3 text-stone-200 text-sm font-light"
            >
              {types.map((t) => <option key={t} value={t}>Type: {t}</option>)}
            </select>
          </div>
        </div>
      </section>

      <section className="max-w-7xl mx-auto px-8 py-10">
        <div className="flex items-baseline justify-between mb-6">
          <div className="font-serif text-2xl text-stone-200">
            {filtered.length} {filtered.length === 1 ? 'jurisdiction' : 'jurisdictions'}
          </div>
          <div className="text-[10px] text-stone-500 uppercase tracking-[0.2em] font-mono">
            sorted by headline rate
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="border border-stone-800 p-12 text-center text-stone-500">
            <FilterIcon size={24} className="mx-auto mb-3 opacity-50" />
            No jurisdictions match your filters.
          </div>
        ) : (
          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
            {[...filtered].sort((a, b) => b.headlineRate - a.headlineRate).map((j) => (
              <JurisdictionCard key={j.id} j={j} onSelect={setSelected} selected={selected?.id === j.id} />
            ))}
          </div>
        )}
      </section>

      <footer className="border-t border-stone-800 mt-10">
        <div className="max-w-7xl mx-auto px-8 py-8 flex flex-col md:flex-row justify-between gap-4 text-xs text-stone-500">
          <div className="font-light">
            <span className="font-mono uppercase tracking-wider">Prototype</span> — Seed data only.
            Production deployment requires regular data refresh and legal review per jurisdiction.
          </div>
          <div className="font-mono uppercase tracking-wider">ReelLedger · v0.1</div>
        </div>
      </footer>

      {selected && <DetailPanel j={selected} onClose={() => setSelected(null)} checked={checked} toggleCheck={toggleCheck} />}
      {showScreener && <PreScreener onClose={() => setShowScreener(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FilmIncentivesApp />);
</script>
</body>
</html>
